# This is the REUSABLE workflow that lives in the pit-boss repo.

name: Pit Boss Report

on:
  workflow_call:
    inputs:
      s3_bucket:
        description: 'S3 bucket where PR-Bouncer stores reviews and decisions'
        required: false
        type: string
        default: 'bm-pr-reviews'
      shakedown_threshold:
        description: 'Min risk score for shakedown candidates (default 7)'
        required: false
        type: number
        default: 7
      use_llm:
        description: 'Enable Gemini AI analysis (narrative, override eval, shakedown reasoning)'
        required: false
        type: boolean
        default: true
      year:
        description: 'Year to analyze (default: previous month)'
        required: false
        type: number
        default: 0
      month:
        description: 'Month to analyze 1-12 (default: previous month)'
        required: false
        type: number
        default: 0
      mode:
        description: 'Run mode: monthly, weekly, or monthly-aggregate'
        required: false
        type: string
        default: 'monthly'
      start_day:
        description: 'Start day for weekly mode (1-31)'
        required: false
        type: number
        default: 0
      end_day:
        description: 'End day for weekly mode (1-31)'
        required: false
        type: number
        default: 0
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_REGION:
        required: false
      GEMINI_API_KEY:
        required: false

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout pit-boss scripts
        uses: actions/checkout@v5
        with:
          repository: BeyondMachines/pit-boss
          path: .pit-boss
          ref: v1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r .pit-boss/requirements.txt

      - name: Resolve periods
        id: period
        env:
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_YEAR: ${{ inputs.year }}
          INPUT_MONTH: ${{ inputs.month }}
          INPUT_START_DAY: ${{ inputs.start_day }}
          INPUT_END_DAY: ${{ inputs.end_day }}
        run: |
          cd .pit-boss/scripts
          python3 resolve_periods.py

      - name: Run pit-boss
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
          S3_BUCKET: ${{ inputs.s3_bucket }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PB_PERIODS: ${{ steps.period.outputs.periods }}
          PB_THRESHOLD: ${{ inputs.shakedown_threshold }}
          PB_USE_LLM: ${{ inputs.use_llm }}
          PB_MODE: ${{ inputs.mode }}
        run: |
          set -e

          case "$PB_MODE" in
            monthly|weekly|monthly-aggregate) ;;
            *)
              echo "Invalid mode: $PB_MODE"
              exit 1
              ;;
          esac

          cd .pit-boss/scripts
          python3 run_periods.py

      - name: Upload as GitHub artifact
        uses: actions/upload-artifact@v5
        with:
          name: pitboss-report-${{ steps.period.outputs.first_year }}-${{ steps.period.outputs.first_month }}-${{ inputs.mode }}-${{ github.run_id }}
          path: pitboss-output/
          retention-days: 90

      - name: Cleanup
        if: always()
        run: rm -rf .pit-boss
name: PR Security Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security-review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    uses: BeyondMachines/pr-bouncer/.github/workflows/security-review.yml@v1
    with:
      risk_threshold: 7
      semgrep_rules: "p/security-audit,p/owasp-top-ten,p/javascript,p/typescript"
      upload_to_s3: true
      s3_bucket: "pr-bouncer-code-reviews" # Parameter for the S3 bucket
    secrets:
      GEMINI_API_KEY: ${{ secrets.PR_BOUNCER_GEMINI_API_KEY }}
      AWS_ACCESS_KEY_ID: ${{ secrets.PR_BOUNCER_AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.PR_BOUNCER_AWS_SECRET_ACCESS_KEY }}
      AWS_REGION: ${{ secrets.PR_BOUNCER_VATBOX_AWS_REGION }}